<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="js/main.js" type="module"></script>
  </head>

  <body>
   <header class="divider" id="main-header"></header>
      
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>
      <section class="categories">
        <a href="/product_listing/?category=tents" class="category">
          <img src="/images/category-tents.svg" alt="Tents" />
          <p>Tents</p>
        </a>
        <a href="/product_listing/?category=backpacks" class="category">
          <img src="/images/category-backpacks.svg" alt="Backpacks" />
          <p>Backpacks</p>
        </a>
        <a href="/product_listing/?category=sleeping-bags" class="category">
          <img src="/images/category-sleepingbags.svg" alt="Sleeping Bags" />
          <p>Sleeping Bags</p>
        </a>
        <a href="/product_listing/?category=hammocks" class="category">
          <img src="/images/category-hammocks.svg" alt="Hammocks" />
          <p>Hammocks</p>
        </a>
      </section>
      <section class="products">
        <h2>Top Products</h2>
        <ul class="product-list"></ul>
      </section>
      <div id="quick-view-modal" class="modal hidden">
        <div class="modal-content">
          <button id="close-modal">&times;</button>
          <div id="modal-body"></div>
        </div>
      </div>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
