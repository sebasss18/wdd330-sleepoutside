<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="js/main.js" type="module"></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>
      
      <!-- New Category Navigation -->
      <section class="products">
        <h2>Shop by Category</h2>
        <ul class="category-list" style="display: flex; gap: 20px; justify-content: center; list-style: none; padding: 0;">
          <li><a href="product_listing/index.html?category=tents">Tents</a></li>
          <li><a href="product_listing/index.html?category=backpacks">Backpacks</a></li>
          <li><a href="product_listing/index.html?category=sleeping-bags">Sleeping Bags</a></li>
          <li><a href="product_listing/index.html?category=hammocks">Hammocks</a></li>
        </ul>
      </section>
      
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
