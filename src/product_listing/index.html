<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Products</title>
    <!-- Fixed paths to point back out to the main folders -->
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/product-listing.js" type="module"></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>
    <main class="divider">
      <!-- The banner and text have been removed. This section is ready for products! -->
      <section class="products">
        <h2 class="title">Top Products</h2>
        
        <!-- Search Container -->
        <div class="search-container" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 2rem; padding: 0 1rem;">
          <input type="text" id="search-input" placeholder="Search for products (e.g., tent)..." style="padding: 0.5rem; width: 100%; max-width: 400px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;" />
          <button id="search-button" style="padding: 0.5rem 1.5rem; cursor: pointer; background-color: #d97a0d; color: white; border: none; border-radius: 4px; font-size: 1rem;">Search</button>
        </div>

        <ul class="product-list"></ul>
      </section>
      
      <div id="quick-view-modal" class="modal hidden">
        <div class="modal-content">
          <button id="close-modal">&times;</button>
          <div id="modal-body"></div>
        </div>
      </div>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
