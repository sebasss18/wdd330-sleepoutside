<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Product Details</title>

    <link rel="stylesheet" href="../css/style.css" />

    <script src="../js/product.js" type="module"></script>
  </head>

  <body>

    <header id="main-header" class="divider"></header>

    <main class="divider">
      <section class="product-detail">

        <h3 class="product-brand"></h3>

        <h2 class="divider product-name"></h2>

        <img
          class="divider product-image"
          src=""
          alt="Product image"
        />

        <p class="product-card__price product-price"></p>

        <p class="product__color product-color"></p>

        <p class="product__description product-description"></p>

        <div class="product-detail__add">
          <button
            id="wishlistBtn"
            class="wishlist-btn"
            type="button"
            aria-label="Add to wishlist"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28">
              <path
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              />
            </svg>
          </button>
          <button id="addToCart" data-id="productId">
            Add to Cart
          </button>
        </div>

      </section>
    </main>

    <footer id="main-footer"></footer>

  </body>
</html>
